

spring:
  datasource:
    url: jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/prontosocorro?sslMode=REQUIRED
    username: 43g3dmxQjes9pvD.root
    password: ${DB_PASSWORD}
    
  spring:
  rabbitmq:
    uri: ${RABBITMQ_URL}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  rabbitmq:
    uri: ${RABBITMQ_URL}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

resilience4j:
  circuitbreaker:
    instances:
      rabbitmq:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
